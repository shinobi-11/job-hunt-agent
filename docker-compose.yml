services:
  job-hunt-agent:
    container_name: job-hunt-agent
    build:
      context: .
      target: production
    image: job-hunt-agent:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/jobs.db').execute('SELECT 1')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
