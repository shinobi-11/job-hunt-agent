<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Job Hunt Agent</title>
  <link rel="stylesheet" href="/static/liquid.css" />
</head>
<body class="lg-body">

  <div id="splash" class="lg-splash">
    <div class="lg-splash-logo">🎯</div>
    <div class="lg-splash-title">Job Hunt Agent</div>
    <div class="lg-splash-loading">
      <span class="lg-splash-dot"></span><span class="lg-splash-dot"></span><span class="lg-splash-dot"></span>
    </div>
  </div>

  <div class="lg-blobs">
    <div class="lg-blob b1"></div>
    <div class="lg-blob b2"></div>
    <div class="lg-blob b3"></div>
  </div>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => document.getElementById("splash")?.classList.add("hidden"), 400);
    });
  </script>

  <nav class="lg-publicnav">
    <a href="/" class="brand">
      <span class="brand-logo">🎯</span>
      <span>Job Hunt Agent</span>
    </a>
    <div class="nav-actions">
      <a href="/signup" class="lg-btn">Need an account? Sign up</a>
    </div>
  </nav>

  <main class="lg-auth-shell">
    <div class="lg-auth-card lg-glow">
      <h1>Welcome back</h1>
      <p class="sub">Log in to keep your job hunt running.</p>

      <form id="loginForm">
        <div>
          <label class="lg-label" for="li-email">Email</label>
          <input id="li-email" class="lg-input" type="email" name="email" required autocomplete="email" autofocus />
        </div>
        <div>
          <label class="lg-label" for="li-pw">Password</label>
          <input id="li-pw" class="lg-input" type="password" name="password" required minlength="8" autocomplete="current-password" />
        </div>
        <button type="submit" class="lg-btn primary big" style="width:100%; margin-top: 6px;">Log in →</button>
      </form>

      <p class="alt">Don't have an account? <a href="/signup">Sign up free</a></p>
      <div id="authError" class="lg-auth-error" hidden></div>
    </div>
  </main>

  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("authError");
      errBox.hidden = true;
      const f = e.target;
      const btn = f.querySelector("button");
      btn.disabled = true; btn.textContent = "Logging in…";
      try {
        const r = await fetch("/api/auth/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({email: f.email.value, password: f.password.value}),
        });
        if (!r.ok) {
          const err = await r.json();
          throw new Error(err.detail || "Login failed");
        }
        location.href = "/app";
      } catch (e) {
        errBox.textContent = e.message;
        errBox.hidden = false;
        btn.disabled = false; btn.textContent = "Log in →";
      }
    };
  </script>
</body>
</html>
